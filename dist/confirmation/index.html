    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background: #F2F2EE;
            color: #1A1A18;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .confirmation-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 40px;
        }

        .confirmation-card {
            background: #fff;
            border-radius: 12px;
            max-width: 540px;
            width: 100%;
            overflow: hidden;
            box-shadow: 0 2px 32px rgba(0, 0, 0, 0.06);
        }

        .card-header {
            background: #2D4A2D;
            padding: 36px 40px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .check-circle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 20px;
        }

        .card-header h1 {
            font-size: 22px;
            font-weight: 600;
            color: #FAFAF7;
            margin: 0 0 4px;
        }

        .card-header p {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            margin: 0;
        }

        .card-body {
            padding: 36px 40px;
        }

        .recap-block {
            background: #F2F2EE;
            border-radius: 8px;
            padding: 20px 24px;
            margin-bottom: 16px;
        }

        .recap-block-title {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #9A9A96;
            margin-bottom: 10px;
        }

        .recap-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-size: 14px;
            color: #1A1A18;
            padding: 4px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }

        .recap-row:last-child {
            border-bottom: none;
        }

        .recap-row-label {
            color: #4A4A46;
        }

        .recap-row-val {
            font-weight: 500;
        }

        .creneau-block {
            background: #2D4A2D;
            border-radius: 8px;
            padding: 20px 24px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .creneau-icon {
            font-size: 24px;
            flex-shrink: 0;
        }

        .creneau-date {
            font-size: 16px;
            font-weight: 600;
            color: #FAFAF7;
            margin-bottom: 3px;
        }

        .creneau-heure {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 20px 24px;
            background: #F2F2EE;
            border-radius: 8px;
            margin-bottom: 28px;
        }

        .total-label {
            font-size: 13px;
            color: #9A9A96;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .total-amount {
            font-size: 32px;
            font-weight: 600;
            color: #2D4A2D;
        }

        .next-steps {
            margin-bottom: 28px;
        }

        .next-steps-title {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #9A9A96;
            margin-bottom: 12px;
        }

        .next-step-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            font-size: 14px;
            color: #4A4A46;
            line-height: 1.6;
            padding: 8px 0;
            border-bottom: 1px solid #F2F2EE;
        }

        .next-step-item:last-child {
            border-bottom: none;
        }

        .step-num {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #2D4A2D;
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .btn-home {
            display: block;
            width: 100%;
            text-align: center;
            background: #2D4A2D;
            color: #fff;
            padding: 14px;
            border-radius: 4px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: background 0.2s;
        }

        .btn-home:hover {
            background: #3D6B3D;
        }

        .order-ref {
            text-align: center;
            font-size: 11px;
            color: #9A9A96;
            margin-top: 16px;
        }

        /* État chargement */
        .loading-state {
            text-align: center;
            padding: 60px 40px;
            color: #9A9A96;
            font-size: 14px;
        }

        @media (max-width: 600px) {

            .card-header,
            .card-body {
                padding: 28px 24px;
            }
        }
    </style>
    <div class="confirmation-wrap">
        <div class="confirmation-card" id="confirmation-card">
            <div class="loading-state">Chargement de votre confirmation…</div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('order_id');
        const sessionId = params.get('session_id');
        const card = document.getElementById('confirmation-card');


        card.innerHTML = `
  <div class="card-header">
    <div class="check-circle">✓</div>
    <div>
      <h1>Réservation confirmée</h1>
      <p>Un email de confirmation vous a été envoyé</p>
    </div>
  </div>
  <div class="card-body">
    <div class="next-steps">
      <div class="next-steps-title">Prochaines étapes</div>
      <div class="next-step-item"><div class="step-num">1</div><div>Vous recevez un <strong>email de confirmation</strong> avec le récapitulatif complet.</div></div>
      <div class="next-step-item"><div class="step-num">2</div><div>Nous vous contactons par <strong>SMS la veille</strong> pour confirmer l'heure d'arrivée.</div></div>
      <div class="next-step-item"><div class="step-num">3</div><div>Le jour J, nous intervenons selon exactement ce que vous avez sélectionné.</div></div>
    </div>
    <div style="background:#F2F2EE;border-radius:8px;padding:18px 24px;margin-bottom:24px;font-size:13px;color:#4A4A46;line-height:1.7">
      Une question ? <a href="mailto:bonjour@colettelabaule.com" style="color:#2D4A2D;font-weight:500">bonjour@colettelabaule.com</a>
    </div>
    <a href="/" class="btn-home">Retour à l'accueil</a>
    <div class="order-ref">Référence : ${orderId || 'N/A'}</div>
  </div>
`;
    </script>
