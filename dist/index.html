<script>
    document.addEventListener("DOMContentLoaded", () => {
        const header = document.querySelector(".header");
        let threshold = window.innerHeight * 0.87;

        function updateThreshold() {
            threshold = window.innerHeight * 0.87;
        }

        function handleScroll() {
            const shouldHaveClass = window.scrollY <= threshold;
            header.classList.toggle("color-text-header-hero", shouldHaveClass);
        }

        header.classList.add("color-text-header-hero");

        window.addEventListener("scroll", handleScroll);
        window.addEventListener("resize", updateThreshold);
    });
